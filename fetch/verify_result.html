<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Result Verification</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root { --border:#e5e7eb; --text:#111827; --muted:#ccd2dd; --bg:#35383a; --txt-color:#dfe6f6;}
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; 
    margin:0; background:var(--bg); color:var(--text); }
    .wrap { max-width: 720px; margin: 40px auto; padding: 0 16px; 
    display: flex;}
    .card { background:#3a3636; border:1px solid var(--border); border-radius:12px; padding:18px; box-shadow: 0 2px 12px rgba(0,0,0,.04); 
    display: flex;
   
    flex-direction: column;
    justify-content: center;
    align-items: center;
    

}

    h1 { font-size: 20px; margin: 0 0 12px; color: var(--txt-color);}
    p.help { margin: 0 0 16px; color: var(--muted); font-size: 14px; }
    form { display:grid; gap: 12px; }
    .row { display:flex; gap: 12px; grid-template-columns: 1fr 1fr;
        flex-direction: column;
     }
    @media (max-width: 600px){ .row { grid-template-columns: 1fr; } }
    label { display:block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input {
      width: 20em; padding: 10px 12px; border:1px solid var(--border);
      border-radius:10px; font-size: 14px; outline: none;

    }
    input:focus { border-color:#2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .actions { display:flex; gap:10px; align-items:center; }
    button {
      border:0; border-radius:10px; padding:10px 14px; font-weight: 600;
      cursor:pointer; font-size: 14px;
    }
    button.primary { background:orange; color:#393636; }
    button.secondary { background:#eef2ff; color:#484a50; }
    .msg { font-size: 14px; }
    .error { color:#b91c1c; }
    .success { color:#047857; }

    .result { margin-top: 16px; display:none; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .kv { border:1px dashed var(--border); border-radius:10px; padding:10px; }
    .k { font-size: 12px; color: var(--muted); }
    .v { font-size: 14px; margin-top: 4px; font-weight: 600; color: whitesmoke;}
    .badge {
      display:inline-block; padding: 4px 10px; border-radius: 999px;
      background:#ecfeff; color:#155e75; font-size: 12px; font-weight: 700;
      border: 1px solid #cffafe;
    }
    .card #home{
      
      /* display: flex;
      position: absolute;
      right: 50%; */
      background-color: rgba(255, 0, 0, 0);
      

      
    }
    #home i{
      font-size: 2rem;
      color: orange;
      &&:hover{
        color: rgb(208, 138, 7);
      }
    }

  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <button id="home"><a href="index.html"></a><i class="fa-solid fa-house"></i></a></button>
      <br><br>
      <h1>Result Verification</h1>
      
      <p class="help">Enter your Roll No and Registration No to view your result.</p>

      <form id="verifyForm" autocomplete="off">
        <div class="row">
          <div>
            <label for="rollNo">Roll No</label>
            <input id="rollNo" name="rollNo" placeholder="e.g., 101" required />
          </div>
          <div>
            <label for="regNo">Registration No</label>
            <input id="regNo" name="regNo" placeholder="e.g., REG-2024-0001" required />
          </div>
        </div>

        <div class="actions">
          <button class="primary" type="submit">Verify Result</button>
          <button class="secondary" type="button" id="resetBtn">Reset</button>
          <span class="msg" id="msg"></span>
        </div>
      </form>

      <div class="result" id="resultCard">
        <hr style="border:0;border-top:1px solid var(--border); margin:16px 0;" />
        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
          <h2 style="font-size:16px; margin:0; color: var(--txt-color);">Verified Result</h2>
          <span class="badge" id="gradeBadge">Grade: -</span>
        </div>

        <div class="grid" style="margin-top:12px;">
          <div class="kv"><div class="k">Name</div><div class="v" id="name">-</div></div>
          <div class="kv"><div class="k">Father Name</div><div class="v" id="fatherName">-</div></div>
          <div class="kv"><div class="k">Mother Name</div><div class="v" id="motherName">-</div></div>
          <div class="kv"><div class="k">Total Marks</div><div class="v" id="totalMarks">-</div></div>
          <div class="kv"><div class="k">Obtained Marks</div><div class="v" id="obtainedMarks">-</div></div>
          <div class="kv"><div class="k">Grade</div><div class="v" id="grade">-</div></div>
        </div>
      </div>
    </div>
  </div>
  

  <script>
    const form = document.getElementById("verifyForm");
    const msg = document.getElementById("msg");
    const resultCard = document.getElementById("resultCard");

    const setMsg = (text, type) => {
      msg.textContent = text || "";
      msg.className = "msg " + (type || "");
    };

    const showResult = (r) => {
      document.getElementById("name").textContent = r.name;
      document.getElementById("fatherName").textContent = r.father_name;
      document.getElementById("motherName").textContent = r.mother_name;
      document.getElementById("totalMarks").textContent = r.total_marks;
      document.getElementById("obtainedMarks").textContent = r.obtain_mark;
      document.getElementById("grade").textContent = r.grade;
      document.getElementById("gradeBadge").textContent = `Grade: ${r.grade}`;
      resultCard.style.display = "block";
    };

   


    const hideResult = () => { resultCard.style.display = "none"; };

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      setMsg("", "");
      hideResult();

      const rollNo = document.getElementById("rollNo").value.trim();
      const regNo  = document.getElementById("regNo").value.trim();

      if (!rollNo || !regNo) {
        setMsg("Please enter both Roll No and Registration No.", "error");
        alert("Please enter correct user id and password")
        return;
      }

      const {data, error } = await supabase_client  
      .from("student_db")   // 🔹 change if your table name is different
      .select("*")
      .eq("roll_no", rollNo)
      .eq("registration_no", regNo)
      .single();

     

      if (error || !data) {
        setMsg("Result not found. Please check Roll No / Registration No.", "error");
        console.log(data);
        
        return;
      }

      setMsg("Result verified successfully.", "success");
      showResult(data);
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      form.reset();
      hideResult();
      setMsg("", "");
    });

    // showResult(data)
  </script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase/supabase.js"></script>
<!-- <script src="supabase/auth.js"></script>
<script src="supabase/guard.js"></script> -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>


</body>
</html>
