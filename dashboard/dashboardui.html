<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard Buttons</title>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <script src="https://cdn.tailwindcss.com"></script>   
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0b1220;
      --card:#121b2e;
      --border:#223054;
      --text:#e9efff;
      --muted:#a9b7df;
      --shadow: 0 10px 25px rgba(0,0,0,.35);
      --radius: 16px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, #17264a 0%, var(--bg) 55%);
      color:var(--text);
      padding:32px;
    }

    .wrap{
      max-width: 1100px;
      margin: 0 auto;
    }

    h1{
      margin:0 0 18px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap:16px;
    }

    .dash-btn{
      appearance:none;
      border:1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      color:var(--text);
      border-radius: var(--radius);
      padding:18px 16px;
      text-align:left;
      box-shadow: var(--shadow);
      cursor:pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      display:flex;
      align-items:center;
      gap:12px;
      min-height:72px;
    }

    .dash-btn:hover{
      transform: translateY(-2px);
      border-color: rgba(130,170,255,.55);
      background: linear-gradient(180deg, rgba(130,170,255,.18), rgba(255,255,255,.03));
    }

    .dash-btn:active{
      transform: translateY(0px) scale(.99);
    }

    .icon{
      width:44px;
      height:44px;
      border-radius: 12px;
      display:grid;
      place-items:center;
      font-size: 22px;
      background: rgba(130,170,255,.14);
      border: 1px solid rgba(130,170,255,.25);
      flex: 0 0 auto;
    }

    .title{
      font-size:16px;
      font-weight:700;
      line-height:1.2;
    }

    .subtitle{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }
    a{
      text-decoration: none;
      color: whitesmoke;
    }
    #logout{
      color: black; 
      background-color: aqua;
      width: 6rem;
      height: 2rem;
      border-radius: 0.2rem;

    }
  </style>
</head>
<body>
   <button id="logout" onclick="logout()">Logout</button>
  <div class="wrap">
    <h1>Dashboard</h1>
   

    <div class="grid">

   

      <button class="dash-btn" type="button" data-aos="fade-left" data-aos-duration="500">
        <a href="../deposit fees/fees_history.html" style="display: flex; justify-content: center; align-items: center; gap: 3em;">
        <span class="icon">💰</span>
     
          <div class="title" id="deposit_fees" >Deposit Fees</div>
         
        
    
        </a>
      </button>
       <button class="dash-btn" type="button" data-aos="fade-left" data-aos-duration="900">
        <a href="dashboard.html"></a>
        <span class="icon">👨‍🎓</span>
        <span>
          <div class="title" id="register_student">Register Student</div>
          <div class="subtitle"></div>
        </span>
        </a>
      </button>

    </div>
  </div>
  <script>
  async function logout() {
  await supabase_client.auth.signOut();
  window.location.href = "login.html";
}

  </script>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="../supabase/supabase.js"></script>
  <script>
    AOS.init();
  </script>
</body>
</html>
